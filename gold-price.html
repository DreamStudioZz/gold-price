<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实时金价监控</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d28;
    --border: #2a2d3a;
    --text: #e0e0e0;
    --sub: #8890a0;
    --gold: #f0b90b;
    --up: #0ecb81;
    --down: #f6465d;
    --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .container { width: 100%; max-width: 720px; }
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .header .gold-dot { color: var(--gold); }
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--sub);
  }
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    background: var(--up);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .main-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 16px;
  }
  .price-section { text-align: center; }
  .label {
    font-size: 14px;
    color: var(--sub);
    margin-bottom: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .main-price {
    font-size: 56px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
  }
  .main-price .unit {
    font-size: 20px;
    color: var(--sub);
    margin-left: 4px;
  }
  .change-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 12px;
    font-size: 16px;
    font-weight: 600;
  }
  .change-row .up { color: var(--up); }
  .change-row .down { color: var(--down); }
  .convert-row {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  .convert-item {
    text-align: center;
  }
  .convert-item .val {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
  }
  .convert-item .lbl {
    font-size: 12px;
    color: var(--sub);
    margin-top: 4px;
  }
  .section-title {
    font-size: 14px;
    color: var(--sub);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-left: 4px;
  }
  .brands-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .brand-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .brand-card .bname {
    font-size: 13px;
    color: var(--text);
  }
  .brand-card .bprice {
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
  }
  .brand-card .bunit {
    font-size: 11px;
    color: var(--sub);
    margin-left: 2px;
  }
  .recovery-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .recovery-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .recovery-card .rname {
    font-size: 11px;
    color: var(--sub);
    margin-bottom: 2px;
  }
  .recovery-card .rprice {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
  }
  .metals-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .metal-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .metal-card .name {
    font-size: 12px;
    color: var(--sub);
    margin-bottom: 6px;
  }
  .metal-card .price {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
  }
  .metal-card .change {
    font-size: 12px;
    margin-top: 4px;
  }
  .error-msg {
    text-align: center;
    padding: 40px;
    color: var(--sub);
  }
  .error-msg button {
    margin-top: 16px;
    padding: 10px 24px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }
  @media (max-width: 600px) {
    .main-price { font-size: 40px; }
    .metals-grid { grid-template-columns: repeat(2, 1fr); }
    .convert-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><span class="gold-dot">●</span> 实时金价监控</h1>
  </div>
  <div class="status-bar">
    <span><span class="status-dot" id="statusDot"></span><span id="updateTime">加载中...</span></span>
    <span id="dataSource" style="font-size:10px;color:var(--sub);">数据源: 等待连接...</span>
    <span id="countdown">下次刷新: 30s</span>
  </div>

  <div id="loading" style="text-align:center;padding:40px;color:var(--sub);">正在获取数据...</div>
  <div id="error" class="error-msg" style="display:none;">
    <p>无法获取金价数据</p>
    <p style="font-size:12px;margin-top:8px;" id="errDetail"></p>
    <button onclick="fetchAll()">重试</button>
  </div>

  <div id="content" style="display:none;">
    <div class="main-card">
      <div class="price-section">
        <div class="label">国际现货黄金 / XAUUSD</div>
        <div class="main-price" id="goldPrice">--</div>
        <div class="change-row">
          <span id="goldChange"></span>
          <span id="goldChangePct"></span>
        </div>
      </div>
      <div class="convert-row">
        <div class="convert-item">
          <div class="val" id="cnyPrice">--</div>
          <div class="lbl">人民币估算（元/克）· 汇率 <span id="fxRate">--</span></div>
        </div>
        <div class="convert-item">
          <div class="val" id="cnyPerOunce">--</div>
          <div class="lbl">人民币/盎司</div>
        </div>
      </div>
    </div>

    <div class="section-title">品牌金店足金饰品价格 <span style="font-weight:400;font-size:11px;" id="brandDate"></span></div>
    <div class="brands-grid" id="brandsGrid"></div>

    <div class="section-title">回收参考价</div>
    <div class="recovery-grid" id="recoveryGrid"></div>

    <div class="section-title">其他贵金属</div>
    <div class="metals-grid">
      <div class="metal-card">
        <div class="name">白银 XAG</div>
        <div class="price" id="silverPrice">--</div>
        <div class="change" id="silverChange"></div>
      </div>
      <div class="metal-card">
        <div class="name">铂金 XPT</div>
        <div class="price" id="platinumPrice">--</div>
        <div class="change" id="platinumChange"></div>
      </div>
      <div class="metal-card">
        <div class="name">钯金 XPD</div>
        <div class="price" id="palladiumPrice">--</div>
        <div class="change" id="palladiumChange"></div>
      </div>
      <div class="metal-card">
        <div class="name">铑</div>
        <div class="price" id="rhodiumPrice">--</div>
        <div class="change" style="color:var(--sub);">参考价</div>
      </div>
    </div>
  </div>
</div>

<script>
const REFRESH_INTERVAL = 30; // 秒
let countdown = REFRESH_INTERVAL;
let prevPrices = {};

function fmtUSD(n) {
  if (n == null || isNaN(n)) return '--';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtCNY(n) {
  if (n == null || isNaN(n)) return '--';
  return '¥' + n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtChange(cur, prev) {
  if (prev == null || isNaN(prev)) return { cls: '', text: '' };
  const diff = cur - prev;
  if (Math.abs(diff) < 0.01) return { cls: '', text: '平' };
  const cls = diff > 0 ? 'up' : 'down';
  const sign = diff > 0 ? '+' : '';
  return { cls, text: sign + diff.toFixed(2) };
}

async function fetchJSON(url) {
  const resp = await fetch(url, { cache: 'no-store' });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

// 品牌金价内嵌数据（每日更新）
const brandData = {
  "date": "2026-06-23",
  "source": "金价查询网(huangjinjiage.cn)",
  "unit": "元/克",
  "brands": [
    {"name": "周大福", "price": 1277},
    {"name": "金至尊", "price": 1277},
    {"name": "谢瑞麟", "price": 1277},
    {"name": "六福珠宝", "price": 1275},
    {"name": "老庙黄金", "price": 1272},
    {"name": "周生生", "price": 1270},
    {"name": "老凤祥", "price": 1268},
    {"name": "菜百首饰", "price": 1260},
    {"name": "中国黄金", "price": 1260}
  ],
  "recovery": {
    "gold": 893, "platinum": 322, "k18": 647, "palladium": 205
  }
};

function renderBrandPrices() {
  document.getElementById('brandDate').textContent = '（' + brandData.date + '）';
  const grid = document.getElementById('brandsGrid');
  grid.innerHTML = brandData.brands.map(b =>
    `<div class="brand-card"><span class="bname">${b.name}</span><span><span class="bprice">${b.price}</span><span class="bunit">元/克</span></span></div>`
  ).join('');

  const r = brandData.recovery;
  document.getElementById('recoveryGrid').innerHTML = [
    { n: '黄金回收', p: r.gold },
    { n: '铂金回收', p: r.platinum },
    { n: '18K金回收', p: r.k18 },
    { n: '钯金回收', p: r.palladium }
  ].map(x => `<div class="recovery-card"><div class="rname">${x.n}</div><div class="rprice">${x.p} 元/克</div></div>`).join('');
}

let prevGold = null;

async function fetchAll() {
  const isFirst = document.getElementById('content').style.display === 'none';
  if (isFirst) {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('error').style.display = 'none';
  }

  try {
    // 优先使用本地实时API，失败则降级到mintedmetal
    let gold, silver, platinum, palladium, rhodium, rate;

    try {
      const [live, fxResp] = await Promise.all([
        fetchJSON('http://127.0.0.1:8088/api/live'),
        fetchJSON('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json')
      ]);
      rate = fxResp?.usd?.cny;
      if (live.gold && rate) {
        gold = { price: live.gold, chgPct: live.gold_chg || 0 };
        silver = { price: live.silver, chgPct: live.silver_chg || 0 };
        platinum = { price: live.platinum, chgPct: live.platinum_chg || 0 };
        palladium = { price: live.palladium, chgPct: live.palladium_chg || 0 };
        rhodium = null;
        // 铑从mintedmetal获取
        try {
          const mResp = await fetchJSON('https://mintedmetal.com/api/prices.json');
          if (mResp?.metals?.rhodium) rhodium = mResp.metals.rhodium;
        } catch(_) {}
        document.getElementById('updateTime').textContent =
          '更新于 ' + (live.time || new Date().toLocaleTimeString('zh-CN', { hour12: false }));
        document.getElementById('dataSource').textContent = '';
        document.getElementById('statusDot').style.background = '#4ade80';
        // 尝试加载品牌金价
        try {
          const brandResp = await fetchJSON('http://127.0.0.1:8088/api/brands');
          if (brandResp.date) {
            brandData.date = brandResp.date;
            brandData.brands = brandResp.brands;
            brandData.recovery = brandResp.recovery;
            renderBrandPrices();
          }
        } catch(_) {}
      } else {
        throw new Error('local');
      }
    } catch (_) {
      // 降级：mintedmetal
      const [mResp, fxResp] = await Promise.all([
        fetchJSON('https://mintedmetal.com/api/prices.json'),
        fetchJSON('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json')
      ]);
      rate = fxResp?.usd?.cny;
      const m = mResp?.metals;
      if (!m?.gold) throw new Error('金价数据缺失');
      gold = { price: m.gold.price, prevPrice: m.gold.previousPrice };
      silver = { price: m.silver?.price, prevPrice: m.silver?.previousPrice };
      platinum = { price: m.platinum?.price, prevPrice: m.platinum?.previousPrice };
      palladium = { price: m.palladium?.price, prevPrice: m.palladium?.previousPrice };
      rhodium = m.rhodium;
      document.getElementById('updateTime').textContent =
        '更新于 ' + new Date().toLocaleTimeString('zh-CN', { hour12: false });
      document.getElementById('dataSource').textContent = '';
      document.getElementById('statusDot').style.background = '#fbbf24';
    }

    if (!rate) throw new Error('汇率获取失败');

    // 国际金价
    const gp = gold.price;
    document.getElementById('goldPrice').innerHTML =
      gp.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) +
      '<span class="unit">USD/oz</span>';

    if (gold.prevPrice) {
      const diff = gp - gold.prevPrice;
      document.getElementById('goldChange').textContent = (diff > 0 ? '+' : '') + diff.toFixed(2) + ' USD';
      document.getElementById('goldChange').className = diff >= 0 ? 'up' : 'down';
      const p = (diff / gold.prevPrice * 100);
      document.getElementById('goldChangePct').textContent = (p > 0 ? '+' : '') + p.toFixed(2) + '%';
      document.getElementById('goldChangePct').className = diff >= 0 ? 'up' : 'down';
    } else if (gold.chgPct !== undefined) {
      document.getElementById('goldChangePct').textContent = (gold.chgPct > 0 ? '+' : '') + gold.chgPct.toFixed(2) + '%';
      document.getElementById('goldChangePct').className = gold.chgPct >= 0 ? 'up' : 'down';
      if (prevGold) {
        const diff = gp - prevGold;
        document.getElementById('goldChange').textContent = (diff > 0 ? '+' : '') + diff.toFixed(2) + ' USD';
        document.getElementById('goldChange').className = diff >= 0 ? 'up' : 'down';
      }
    }
    prevGold = gp;

    // 人民币换算
    const cnyPerOunce = gp * rate;
    const cnyPerGram = cnyPerOunce / 31.1035;
    document.getElementById('cnyPrice').textContent = '¥' + cnyPerGram.toFixed(1);
    document.getElementById('cnyPerOunce').textContent = '¥' + cnyPerOunce.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
    document.getElementById('fxRate').textContent = rate.toFixed(4);

    // 其他贵金属
    function renderMetal(id, data, usePrev) {
      if (!data) return;
      document.getElementById(id + 'Price').textContent = fmtUSD(data.price);
      if (usePrev && data.prevPrice) {
        const d = data.price - data.prevPrice;
        const p = (d / data.prevPrice * 100);
        document.getElementById(id + 'Change').textContent = (p > 0 ? '+' : '') + p.toFixed(2) + '%';
        document.getElementById(id + 'Change').className = d >= 0 ? 'up' : 'down';
      } else if (data.chgPct !== undefined) {
        document.getElementById(id + 'Change').textContent = (data.chgPct > 0 ? '+' : '') + data.chgPct.toFixed(2) + '%';
        document.getElementById(id + 'Change').className = data.chgPct >= 0 ? 'up' : 'down';
      }
    }
    renderMetal('silver', silver, !('chgPct' in silver));
    renderMetal('platinum', platinum, !('chgPct' in platinum));
    renderMetal('palladium', palladium, !('chgPct' in palladium));
    if (rhodium) document.getElementById('rhodiumPrice').textContent = fmtUSD(rhodium.price);

    if (isFirst) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }
    countdown = REFRESH_INTERVAL;
    updateCountdown();
  } catch (e) {
    if (isFirst) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('errDetail').textContent = e.message;
    }
  }
}

renderBrandPrices();

function updateCountdown() {
  document.getElementById('countdown').textContent = `下次刷新: ${countdown}s`;
  if (countdown <= 0) {
    fetchAll();
    countdown = REFRESH_INTERVAL;
  }
  countdown--;
}

fetchAll();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
